<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GSEQ 序列分析繪圖工具</title>
  
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 React 與 ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- 載入 Babel 以在瀏覽器中編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useRef, useEffect } = React;

    // 預設的測試數據
    const defaultData = `	Look	Smile	Talk	Touch
Look	-1.20	2.55	0.50	-0.30
Smile	0.10	-0.50	3.21	1.15
Talk	2.10	0.00	-1.10	2.85
Touch	0.50	1.50	-0.20	-0.80`;

    function App() {
      const [inputText, setInputText] = useState(defaultData);
      const [threshold, setThreshold] = useState(1.96);
      const [error, setError] = useState('');
      
      // 篩選狀態管理
      const [valueFilter, setValueFilter] = useState('all'); 
      const [visibleNodes, setVisibleNodes] = useState(new Set());
      
      // 拖曳狀態管理 (節點)
      const svgRef = useRef(null);
      const [manualPositions, setManualPositions] = useState({});
      const [draggingNode, setDraggingNode] = useState(null);
      
      // 拖曳狀態管理 (數值標籤)
      const [labelOffsets, setLabelOffsets] = useState({}); 
      const [draggingLabel, setDraggingLabel] = useState(null);

      // 版權與版本紀錄隱藏狀態
      const [showAbout, setShowAbout] = useState(false);
      
      // 畫布基本設定
      const canvasSize = 800;
      const canvasCenter = canvasSize / 2;

      // 解析輸入的文字資料 (支援 Tab、逗號、多個空白、特殊空白符號)
      const parsedData = useMemo(() => {
        try {
          setError('');
          if (!inputText.trim()) return { nodes: [], edges: [] };

          const lines = inputText.split('\n');
          if (lines.length < 2) throw new Error("資料行數不足，請提供包含標題的矩陣資料。");

          // 讀取並清理標題列 (替換 non-breaking space)
          const cleanHeaderLine = lines[0].replace(/\u00A0/g, ' ').trim();
          const headers = cleanHeaderLine.split(/\t|,|\s{2,}/).map(s => s.trim()).filter(s => s !== '');
          
          if (headers.length === 0) throw new Error("無法解析行為標題，請確認格式。");

          const nodesSet = new Set(headers);
          const edges = [];

          // 讀取數據列
          for (let i = 1; i < lines.length; i++) {
            const cleanLine = lines[i].replace(/\u00A0/g, ' ').trim();
            if (!cleanLine) continue;

            const columns = cleanLine.split(/\t|,|\s{2,}/).map(s => s.trim()).filter(s => s !== '');
            if (columns.length === 0) continue;

            const sourceNode = columns[0];
            nodesSet.add(sourceNode);

            for (let j = 1; j < columns.length; j++) {
              const targetNode = headers[j - 1];
              const value = parseFloat(columns[j]);
              
              if (!targetNode) continue;
              
              if (!isNaN(value)) {
                edges.push({
                  source: sourceNode,
                  target: targetNode,
                  value: value
                });
              }
            }
          }

          return {
            nodes: Array.from(nodesSet),
            edges: edges
          };
        } catch (err) {
          setError(err.message || '資料解析失敗，請確保格式為從 Excel 複製的表格。');
          return { nodes: [], edges: [] };
        }
      }, [inputText]);

      // 動態計算節點半徑：優化大小，設定合理的上限與下限，避免過度膨脹
      const nodeRadius = useMemo(() => {
        if (parsedData.nodes.length === 0) return 32;
        const maxLen = Math.max(...parsedData.nodes.map(n => n.length));
        // 基礎大小 32，字元越多稍微放大，但最高不超過 42
        return Math.min(42, Math.max(32, maxLen * 2.8));
      }, [parsedData.nodes]);

      // 當資料改變時，重置拖曳位置
      useEffect(() => {
        setManualPositions({});
        setLabelOffsets({}); 
        setVisibleNodes(new Set(parsedData.nodes));
      }, [parsedData.nodes]);

      // 自動排版與對齊功能
      const handleFormatText = () => {
        try {
          const lines = inputText.split('\n');
          if (lines.length < 2) return;

          const headers = lines[0].replace(/\u00A0/g, ' ').trim().split(/\t|,|\s{2,}/).map(s => s.trim()).filter(s => s !== '');
          if (headers.length === 0) return;

          const rows = [ ["", ...headers] ]; // 第一列左上角留空

          for (let i = 1; i < lines.length; i++) {
            const cleanLine = lines[i].replace(/\u00A0/g, ' ').trim();
            if (!cleanLine) continue;
            const columns = cleanLine.split(/\t|,|\s{2,}/).map(s => s.trim()).filter(s => s !== '');
            if (columns.length > 0) {
              rows.push(columns);
            }
          }

          // 計算每個欄位的最大寬度
          const colWidths = [];
          rows.forEach(row => {
            row.forEach((cell, i) => {
              colWidths[i] = Math.max(colWidths[i] || 0, cell.length);
            });
          });

          // 重建對齊後的文字
          const formattedText = rows.map(row => {
            return row.map((cell, i) => cell.padEnd(colWidths[i] + 3, ' ')).join('');
          }).join('\n');

          setInputText(formattedText);
        } catch (err) {
          console.error("Formatting failed", err);
          setError("文字排版失敗，請確認資料格式是否正確。");
        }
      };

      // 節點篩選切換邏輯
      const toggleNode = (node) => {
        setVisibleNodes(prev => {
          const next = new Set(prev);
          if (next.has(node)) next.delete(node);
          else next.add(node);
          return next;
        });
      };

      const toggleAllNodes = () => {
        if (visibleNodes.size === parsedData.nodes.length) {
          setVisibleNodes(new Set()); 
        } else {
          setVisibleNodes(new Set(parsedData.nodes)); 
        }
      };

      // 過濾連線
      const filteredEdges = useMemo(() => {
        return parsedData.edges.filter(edge => {
          if (!visibleNodes.has(edge.source) || !visibleNodes.has(edge.target)) return false;
          if (Math.abs(edge.value) < threshold) return false;
          if (valueFilter === 'positive' && edge.value < 0) return false;
          if (valueFilter === 'negative' && edge.value >= 0) return false;
          return true;
        });
      }, [parsedData.edges, threshold, visibleNodes, valueFilter]);

      // 計算預設座標
      const defaultPositions = useMemo(() => {
        const radius = 300;
        const pos = {};
        parsedData.nodes.forEach((node, index) => {
          const angle = (index / parsedData.nodes.length) * 2 * Math.PI - Math.PI / 2; 
          pos[node] = {
            x: canvasCenter + radius * Math.cos(angle),
            y: canvasCenter + radius * Math.sin(angle),
          };
        });
        return pos;
      }, [parsedData.nodes, canvasCenter]);

      const currentPositions = useMemo(() => {
        return { ...defaultPositions, ...manualPositions };
      }, [defaultPositions, manualPositions]);

      // --- 拖曳事件處理 ---
      const handlePointerDown = (e, node) => {
        e.preventDefault();
        e.stopPropagation();
        setDraggingNode(node);
        e.target.setPointerCapture(e.pointerId); 
      };

      const handleLabelPointerDown = (e, edgeKey) => {
        e.preventDefault();
        e.stopPropagation();
        
        const svg = svgRef.current;
        const pt = svg.createSVGPoint();
        pt.x = e.clientX;
        pt.y = e.clientY;
        const cursorPt = pt.matrixTransform(svg.getScreenCTM().inverse());
        
        setDraggingLabel({
          key: edgeKey,
          startX: cursorPt.x,
          startY: cursorPt.y,
          initOffsetX: labelOffsets[edgeKey]?.x || 0,
          initOffsetY: labelOffsets[edgeKey]?.y || 0
        });
        
        e.target.setPointerCapture(e.pointerId);
      };

      const handlePointerMove = (e) => {
        if (!svgRef.current) return;
        
        const svg = svgRef.current;
        const pt = svg.createSVGPoint();
        pt.x = e.clientX;
        pt.y = e.clientY;
        const cursorPt = pt.matrixTransform(svg.getScreenCTM().inverse());

        if (draggingNode) {
          setManualPositions(prev => ({
            ...prev,
            [draggingNode]: { x: cursorPt.x, y: cursorPt.y }
          }));
        } 
        else if (draggingLabel) {
          const dx = cursorPt.x - draggingLabel.startX;
          const dy = cursorPt.y - draggingLabel.startY;
          
          setLabelOffsets(prev => ({
            ...prev,
            [draggingLabel.key]: {
              x: draggingLabel.initOffsetX + dx,
              y: draggingLabel.initOffsetY + dy
            }
          }));
        }
      };

      const handlePointerUp = (e) => {
        if (draggingNode) {
          setDraggingNode(null);
          if (e.target.hasPointerCapture(e.pointerId)) e.target.releasePointerCapture(e.pointerId);
        }
        if (draggingLabel) {
          setDraggingLabel(null);
          if (e.target.hasPointerCapture(e.pointerId)) e.target.releasePointerCapture(e.pointerId);
        }
      };

      // 下載 PNG
      const handleDownloadPNG = () => {
        if (!svgRef.current) return;
        const svgElement = svgRef.current;
        const svgData = new XMLSerializer().serializeToString(svgElement);
        
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        const img = new Image();
        canvas.width = canvasSize;
        canvas.height = canvasSize;

        img.onload = () => {
          ctx.fillStyle = "white";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0);
          
          const pngFile = canvas.toDataURL("image/png");
          const downloadLink = document.createElement("a");
          downloadLink.download = "gseq-plot.png";
          downloadLink.href = pngFile;
          downloadLink.click();
        };

        img.src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svgData)));
      };

      const resetLayout = () => {
        setManualPositions({});
        setLabelOffsets({});
      };

      // 繪製路徑計算
      const calculateCurve = (source, target, value) => {
        const s = currentPositions[source];
        const t = currentPositions[target];
        if (!s || !t) return null;

        if (source === target) {
          let nx = s.x - canvasCenter;
          let ny = s.y - canvasCenter;
          const dist = Math.sqrt(nx*nx + ny*ny) || 1;
          nx = nx / dist;
          ny = ny / dist;
          if (s.x === canvasCenter && s.y === canvasCenter) { nx = 0; ny = -1; }

          const px = -ny;
          const py = nx;
          const finalSx = s.x + (nx * 0.866 + px * 0.5) * nodeRadius;
          const finalSy = s.y + (ny * 0.866 + py * 0.5) * nodeRadius;
          const finalTx = s.x + (nx * 0.866 - px * 0.5) * nodeRadius;
          const finalTy = s.y + (ny * 0.866 - py * 0.5) * nodeRadius;

          // 動態計算貝茲曲線的控制點距離
          const loopDist = nodeRadius * 2.5 + 25;
          const loopSpread = nodeRadius * 1.5 + 15;
          const cp1x = s.x + nx * loopDist + px * loopSpread;
          const cp1y = s.y + ny * loopDist + py * loopSpread;
          const cp2x = s.x + nx * loopDist - px * loopSpread;
          const cp2y = s.y + ny * loopDist - py * loopSpread;
          
          return {
            path: `M ${finalSx} ${finalSy} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${finalTx} ${finalTy}`,
            textX: s.x + nx * (loopDist + 15),
            textY: s.y + ny * (loopDist + 15),
            isPositive: value >= 0
          };
        }

        const dx = t.x - s.x;
        const dy = t.y - s.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist === 0) return null;

        const ux = dx / dist;
        const uy = dy / dist;
        const offset = 12; 
        const nx = -uy;
        const ny = ux;
        
        const sx = s.x + nx * offset;
        const sy = s.y + ny * offset;
        const tx = t.x + nx * offset;
        const ty = t.y + ny * offset;

        const finalSx = sx + ux * nodeRadius;
        const finalSy = sy + uy * nodeRadius;
        const finalTx = tx - ux * nodeRadius;
        const finalTy = ty - uy * nodeRadius;

        const midX = (finalSx + finalTx) / 2;
        const midY = (finalSy + finalTy) / 2;

        return {
          path: `M ${finalSx} ${finalSy} L ${finalTx} ${finalTy}`,
          textX: midX,
          textY: midY,
          isPositive: value >= 0
        };
      };

      return (
        <div className="min-h-screen p-6 font-sans text-gray-800">
          <div className="max-w-[1400px] mx-auto space-y-6">
            
            <header className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
              <h1 className="text-2xl font-bold text-gray-800">GSEQ 序列分析繪圖工具</h1>
              <p className="text-gray-500 mt-2">
                將 GSEQ 矩陣報表貼上下方文字框。右側畫布支援<strong>自由拖曳節點</strong>與<strong>數值標籤</strong>，避免資料重疊。
              </p>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
              
              {/* 左側控制面板 */}
              <div className="space-y-6 lg:col-span-3">
                
                {/* 1. 資料輸入 */}
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                  <label className="block text-sm font-semibold text-gray-700 mb-2">
                    1. 貼上矩陣資料
                  </label>
                  <textarea
                    className="w-full min-h-[200px] h-64 lg:h-96 resize-y overflow-auto p-3 border border-gray-300 rounded-lg text-sm font-mono focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                    value={inputText}
                    onChange={(e) => setInputText(e.target.value)}
                    placeholder="貼上你的 Excel 資料..."
                    wrap="off"
                  />
                  {error && <p className="text-red-500 text-sm mt-2 font-medium">{error}</p>}
                  
                  <div className="flex flex-col gap-2 mt-3">
                    <button 
                      onClick={handleFormatText}
                      className="w-full py-2 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 border border-indigo-200 text-sm font-bold rounded-lg transition-colors shadow-sm"
                    >
                      ✨ 自動排版對齊 (整理貼上資料)
                    </button>
                    <div className="flex gap-2">
                      <button 
                        onClick={resetLayout}
                        className="flex-1 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium rounded-lg transition-colors"
                      >
                        重置畫布
                      </button>
                      <button 
                        onClick={handleDownloadPNG}
                        className="flex-1 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg shadow-sm transition-colors"
                      >
                        下載圖片
                      </button>
                    </div>
                  </div>
                </div>

                {/* 2. 顯著水準 */}
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                  <label className="block text-sm font-semibold text-gray-700 mb-2">
                    2. 顯著水準閾值 (Z值)
                  </label>
                  <div className="flex items-center gap-4">
                    <input
                      type="range"
                      min="0"
                      max="5"
                      step="0.01"
                      value={threshold}
                      onChange={(e) => setThreshold(parseFloat(e.target.value))}
                      className="flex-1"
                    />
                    <span className="font-mono bg-gray-100 px-3 py-1 rounded text-sm font-semibold">
                      {threshold.toFixed(2)}
                    </span>
                  </div>
                </div>

                {/* 3. 篩選條件 */}
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                  <label className="block text-sm font-semibold text-gray-700 mb-3">
                    3. 篩選條件
                  </label>
                  <div className="mb-4 pb-4 border-b border-gray-100">
                    <div className="flex flex-col gap-2 text-sm text-gray-700">
                      <label className="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="valueFilter" value="all" checked={valueFilter === 'all'} onChange={() => setValueFilter('all')} className="text-blue-600 focus:ring-blue-500" /> 全部顯示
                      </label>
                      <label className="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="valueFilter" value="positive" checked={valueFilter === 'positive'} onChange={() => setValueFilter('positive')} className="text-blue-600 focus:ring-blue-500" /> 僅顯示正向 (促進)
                      </label>
                      <label className="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="valueFilter" value="negative" checked={valueFilter === 'negative'} onChange={() => setValueFilter('negative')} className="text-red-500 focus:ring-red-500" /> 僅顯示負向 (抑制)
                      </label>
                    </div>
                  </div>
                  <div>
                    <div className="flex justify-between items-center mb-2">
                      <p className="text-xs text-gray-500 font-medium">顯示參與的節點：</p>
                      <button onClick={toggleAllNodes} className="text-xs font-medium text-blue-600 hover:text-blue-800 transition-colors">
                        全選 / 反選
                      </button>
                    </div>
                    <div className="flex flex-wrap gap-2 mt-2 max-h-48 overflow-y-auto">
                      {parsedData.nodes.map(node => (
                        <label key={node} className={`flex items-center gap-2 text-xs px-2 py-1 rounded border cursor-pointer transition-colors ${visibleNodes.has(node) ? 'bg-blue-50 border-blue-200 text-blue-800' : 'bg-gray-50 border-gray-200 text-gray-500 hover:bg-gray-100'}`}>
                          <input type="checkbox" className="rounded text-blue-600 focus:ring-blue-500 w-3 h-3" checked={visibleNodes.has(node)} onChange={() => toggleNode(node)} /> 
                          {node}
                        </label>
                      ))}
                    </div>
                  </div>
                </div>
              </div>

              {/* 右側畫布區域 */}
              <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200 lg:col-span-9 flex flex-col items-center justify-center overflow-hidden">
                <h2 className="text-lg font-bold mb-4 w-full text-center">行為狀態轉換圖</h2>
                
                {parsedData.nodes.length === 0 ? (
                  <div className="h-[800px] flex items-center justify-center text-gray-400">
                    沒有可渲染的節點資料
                  </div>
                ) : (
                  <svg 
                    ref={svgRef}
                    width={canvasSize} 
                    height={canvasSize} 
                    className="max-w-full h-auto select-none touch-none bg-white rounded-lg border border-dashed border-gray-200"
                    viewBox={`0 0 ${canvasSize} ${canvasSize}`}
                    onPointerMove={handlePointerMove}
                    onPointerUp={handlePointerUp}
                    onPointerLeave={handlePointerUp}
                  >
                    <defs>
                      <marker id="arrow-positive" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
                        <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" />
                      </marker>
                      <marker id="arrow-negative" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
                        <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" />
                      </marker>
                    </defs>

                    {/* 繪製連線與拖曳標籤 */}
                    {filteredEdges.map((edge, i) => {
                      const curveData = calculateCurve(edge.source, edge.target, edge.value);
                      if (!curveData) return null;
                      
                      const isPositive = curveData.isPositive;
                      const edgeKey = `${edge.source}-${edge.target}`;
                      const labelOffset = labelOffsets[edgeKey] || { x: 0, y: 0 };
                      const isDraggingThisLabel = draggingLabel && draggingLabel.key === edgeKey;
                      
                      return (
                        <g key={`edge-${i}`}>
                          <path
                            d={curveData.path}
                            fill="none"
                            stroke={isPositive ? "#3b82f6" : "#ef4444"}
                            strokeWidth="2"
                            strokeDasharray={isPositive ? "none" : "5,5"}
                            markerEnd={`url(#arrow-${isPositive ? 'positive' : 'negative'})`}
                            opacity="0.8"
                            className="transition-opacity duration-300 ease-in-out hover:opacity-100 hover:stroke-[3px]"
                          />
                          
                          {/* 可拖曳的標籤群組 */}
                          <g 
                            transform={`translate(${labelOffset.x}, ${labelOffset.y})`}
                            onPointerDown={(e) => handleLabelPointerDown(e, edgeKey)}
                            className={isDraggingThisLabel ? "cursor-grabbing" : "cursor-grab"}
                          >
                            <rect 
                              x={curveData.textX - 22} 
                              y={curveData.textY - 11} 
                              width="44" 
                              height="22" 
                              fill="white" 
                              fillOpacity="0.95"
                              rx="4"
                              stroke={isDraggingThisLabel ? "#3b82f6" : "transparent"}
                              strokeWidth="1.5"
                              pointerEvents="all" 
                              className="transition-colors hover:stroke-gray-300 shadow-sm hover:drop-shadow-md"
                            />
                            <text
                              x={curveData.textX}
                              y={curveData.textY}
                              textAnchor="middle"
                              dominantBaseline="middle"
                              fontSize="11"
                              fontWeight="bold"
                              fill={isPositive ? "#1d4ed8" : "#b91c1c"}
                              pointerEvents="none" 
                              style={{ userSelect: 'none' }}
                            >
                              {edge.value.toFixed(2)}
                            </text>
                          </g>
                        </g>
                      );
                    })}

                    {/* 繪製節點 */}
                    {parsedData.nodes.filter(n => visibleNodes.has(n)).map((node, i) => {
                      const pos = currentPositions[node];
                      if (!pos) return null;
                      
                      const isDragging = draggingNode === node;

                      return (
                        <g 
                          key={`node-${i}`} 
                          transform={`translate(${pos.x}, ${pos.y})`}
                          onPointerDown={(e) => handlePointerDown(e, node)}
                          className={isDragging ? "cursor-grabbing" : "cursor-grab"}
                        >
                          <circle
                            r={nodeRadius}
                            fill="#ffffff"
                            stroke={isDragging ? "#3b82f6" : "#4b5563"}
                            strokeWidth={isDragging ? "3.5" : "2"}
                            className={`transition-shadow ${isDragging ? 'filter drop-shadow-lg' : 'hover:drop-shadow-md'}`}
                          />
                          <text
                            textAnchor="middle"
                            dominantBaseline="middle"
                            /* 微調：如果文字長度大於 8，字體就稍微縮小一點點，避免超出邊界 */
                            fontSize={node.length > 8 ? "10" : "12"}
                            fontWeight="bold"
                            fill="#1f2937"
                            pointerEvents="none"
                            style={{ userSelect: 'none' }}
                          >
                            {node}
                          </text>
                        </g>
                      );
                    })}
                  </svg>
                )}
              </div>

            </div>

            {/* 低調的版本歷程與作者資訊 */}
            <footer className="mt-6 text-center text-xs text-gray-400">
              <button 
                onClick={() => setShowAbout(!showAbout)} 
                className="hover:text-gray-600 transition-colors focus:outline-none"
              >
                GSEQ 繪圖工具 v1.6.2 © pengweijie
              </button>
              
              {showAbout && (
                <div className="mt-4 p-4 bg-white rounded-lg shadow-sm border border-gray-200 text-left text-gray-500 max-w-2xl mx-auto">
                  <h4 className="font-semibold text-gray-700 mb-2">版本歷程</h4>
                  <ul className="list-disc list-inside space-y-1.5 text-xs text-gray-500">
                    <li><strong className="text-gray-700">v1.6.2 (最新)</strong> - 優化節點大小比例：限制最大膨脹半徑，並針對長編碼自動縮小字體，解決圓圈過大造成的視覺不協調。</li>
                    <li><strong className="text-gray-700">v1.6.1</strong> - 加入「動態節點大小」，自動依據最長編碼名稱調整圓圈半徑，並同步縮放自我重複線條，完美解決文字出框問題。</li>
                    <li><strong className="text-gray-700">v1.6.0</strong> - 新增「自動排版對齊」按鈕並強制關閉輸入框自動換行，解決龐大矩陣貼上後格式亂掉與不換行空白 (nbsp) 造成的錯位問題。</li>
                    <li><strong className="text-gray-700">v1.5.1</strong> - 優化協作平台嵌入顯示：加入自適應高度與輸入區塊強制捲動。</li>
                    <li><strong className="text-gray-700">v1.5.0</strong> - 數值標籤支援自由拖曳（解決重疊問題），並大幅擴增資料輸入區塊（支援右下角手動拖曳放大）。</li>
                  </ul>
                </div>
              )}
            </footer>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
